<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Send Grandpa a Letter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, 'Segoe UI', sans-serif;
      background: #f0faf9;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 24px;
      padding: 40px;
      max-width: 560px;
      width: 100%;
      box-shadow: 0 8px 40px rgba(0,0,0,0.1);
    }

    h1 {
      font-size: 26px;
      color: #145f55;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 15px;
      color: #888;
      margin-bottom: 28px;
    }

    textarea {
      width: 100%;
      min-height: 180px;
      padding: 18px;
      font-size: 18px;
      font-family: inherit;
      border: 2px solid #d0e8e5;
      border-radius: 14px;
      resize: vertical;
      outline: none;
      color: #1c1c1e;
      line-height: 1.6;
      margin-bottom: 16px;
    }
    textarea:focus { border-color: #1a7a6e; }

    .btn-send {
      width: 100%;
      padding: 18px;
      background: #1a7a6e;
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-send:hover  { background: #145f55; }
    .btn-send:active { transform: scale(0.98); }

    .result {
      display: none;
      margin-top: 20px;
      background: #e6f4f2;
      border: 2px solid #1a7a6e;
      border-radius: 14px;
      padding: 18px;
    }

    .result-label {
      font-size: 14px;
      font-weight: 700;
      color: #145f55;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .result-url {
      font-size: 13px;
      color: #444;
      word-break: break-all;
      background: #fff;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 12px;
      border: 1px solid #c0ddd9;
    }

    .result-actions {
      display: flex;
      gap: 10px;
    }

    .btn-copy, .btn-open {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-copy { background: #d0e8e5; color: #145f55; }
    .btn-copy:hover { background: #b8dbd7; }
    .btn-copy.copied { background: #1a7a6e; color: #fff; }

    .btn-open { background: #1a7a6e; color: #fff; }
    .btn-open:hover { background: #145f55; }

    .btn-clear {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      background: none;
      color: #888;
      border: 2px solid #ddd;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-clear:hover { border-color: #c0392b; color: #c0392b; }

    .note {
      margin-top: 16px;
      font-size: 13px;
      color: #888;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>✉️ Send Grandpa a Letter</h1>
    <p class="subtitle">Type your message below — it'll open on his app automatically.</p>

    <textarea id="msg" placeholder="Write your message here…"></textarea>

    <button class="btn-send" id="btn-send" onclick="sendLetter()">Send to Grandpa →</button>
    <button class="btn-clear" id="btn-clear" onclick="clearLetter()">Clear letter from his screen</button>

    <div class="result" id="result">
      <div class="result-label" id="result-label"></div>
    </div>

    <p class="note">His app checks for new letters automatically every 30 min — no action needed from him.</p>
  </div>

  <script>
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbynRnOepcTh1LnJATtqS1Jb-3gSitCUXBNrVrtwUoCrh03KXxIf36MULAI0lOAhjvKa/exec';

    async function sendLetter() {
      const msg  = document.getElementById('msg').value.trim();
      if (!msg) { document.getElementById('msg').focus(); return; }

      const btn = document.getElementById('btn-send');
      btn.textContent = 'Sending…';
      btn.disabled = true;

      await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        mode:   'no-cors',
        body:   JSON.stringify({ type: 'set_letter', text: msg }),
      });

      btn.textContent = 'Send to Grandpa →';
      btn.disabled = false;
      showResult('✅ Letter sent! His app will show it within 30 minutes (or 5 sec if ?debug is on).');
      document.getElementById('msg').value = '';
    }

    async function clearLetter() {
      const btn = document.getElementById('btn-clear');
      btn.textContent = 'Clearing…';
      btn.disabled = true;

      await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        mode:   'no-cors',
        body:   JSON.stringify({ type: 'set_letter', text: '' }),
      });

      btn.textContent = 'Clear letter from his screen';
      btn.disabled = false;
      showResult('🗑️ Letter cleared. It will disappear from his screen on the next poll.');
    }

    function showResult(msg) {
      const el = document.getElementById('result');
      document.getElementById('result-label').textContent = msg;
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 5000);
    }

    // Submit on Cmd+Enter
    document.getElementById('msg').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) sendLetter();
    });
  </script>

</body>
</html>
